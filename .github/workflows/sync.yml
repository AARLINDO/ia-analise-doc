name: Sincronizar com o Hub do Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Remover imagens para evitar bloqueio
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git rm --cached carmelio_logo.png.png logo.jpg.png || true
          git commit -m "Removendo imagens locais para deploy" || true

      - name: Enviar para o Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ArthurCarmelio:$HF_TOKEN@huggingface.co/spaces/ArthurCarmelio/carmelio-ai main:main
