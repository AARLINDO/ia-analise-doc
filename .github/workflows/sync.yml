name: Sync to Hugging Face Hub
on:
  push:
    branches: [main, principal]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ArthurCarmelio:$HF_TOKEN@huggingface.co/spaces/ArthurCarmelio/ia-analise-doc main
