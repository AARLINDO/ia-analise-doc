name: Sincronizar com o Hub do Hugging Face
on:
  push:
    branches: [main, principal]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enviar para o Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ArthurCarmelio:$HF_TOKEN@huggingface.co/spaces/ArthurCarmelio/carmelio-ai principal:main
